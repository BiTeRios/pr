name: ToDo Docker CI/CD

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image for tests
        run: docker build -t todo_backend:ci ./backend

      - name: Build frontend image for tests
        run: docker build -t todo_frontend:ci ./frontend

      - name: Create Docker network
        run: docker network create todo_net

      - name: Start PostgreSQL container
        run: |
          docker run -d --name todo_db --network todo_net \
            -e POSTGRES_USER=todo_user \
            -e POSTGRES_PASSWORD=todo_password \
            -e POSTGRES_DB=todo_db \
            -v "$PWD/db/init.sql:/docker-entrypoint-initdb.d/init.sql" \
            -p 5432:5432 postgres:16

      - name: Wait for PostgreSQL
        run: |
          timeout 60 bash -c 'until docker exec todo_db pg_isready -U todo_user -d todo_db; do sleep 2; done'

      - name: Start GreenMail container
        run: |
          docker run -d --name todo_mail --network todo_net \
            -e GREENMAIL_OPTS="-Dgreenmail.setup.test.all -Dgreenmail.hostname=0.0.0.0 -Dgreenmail.users=user:password@localhost" \
            -p 3025:3025 -p 3143:3143 -p 3110:3110 greenmail/standalone:2.1.3

      - name: Start backend container
        run: |
          docker run -d --name todo_backend --network todo_net \
            -e DATABASE_URL=postgresql+psycopg2://todo_user:todo_password@todo_db:5432/todo_db \
            -e SMTP_HOST=todo_mail -e SMTP_PORT=3025 \
            -e IMAP_HOST=todo_mail -e IMAP_PORT=3143 \
            -e POP3_HOST=todo_mail -e POP3_PORT=3110 \
            -e MAIL_FROM=user@localhost \
            -e MAIL_PASSWORD=password \
            -p 8000:8000 todo_backend:ci

      - name: Start frontend container
        run: |
          docker run -d --name todo_frontend --network todo_net \
            -e VITE_API_URL=http://localhost:8000 \
            -p 5173:5173 todo_frontend:ci

      - name: Show running containers
        run: docker ps

      - name: Wait for backend and frontend
        run: |
          timeout 60 bash -c 'until curl -fsS http://localhost:8000/health; do sleep 2; done'
          timeout 60 bash -c 'until curl -fsS http://localhost:5173; do sleep 2; done'

      - name: Test REST API with curl
        run: |
          curl -fsS http://localhost:8000/health
          curl -fsS http://localhost:8000/tasks

          RESPONSE=$(curl -fsS -X POST http://localhost:8000/tasks \
            -H "Content-Type: application/json" \
            -d '{"title":"CI task","description":"Created by GitHub Actions"}')

          echo "$RESPONSE"
          TASK_ID=$(python3 -c 'import json,sys; print(json.loads(sys.argv[1])["id"])' "$RESPONSE")
          echo "Created task ID: $TASK_ID"

          curl -fsS http://localhost:8000/tasks/$TASK_ID

          curl -fsS -X PUT http://localhost:8000/tasks/$TASK_ID \
            -H "Content-Type: application/json" \
            -d '{"title":"CI task updated","description":"Updated by GitHub Actions","completed":true}'

          curl -fsS http://localhost:8000/tasks/$TASK_ID

      - name: Test mail endpoints with curl
        run: |
          RESPONSE=$(curl -fsS -X POST http://localhost:8000/tasks \
            -H "Content-Type: application/json" \
            -d '{"title":"Mail CI task","description":"Task for SMTP/IMAP/POP3 test"}')
          TASK_ID=$(python3 -c 'import json,sys; print(json.loads(sys.argv[1])["id"])' "$RESPONSE")

          curl -fsS -X POST http://localhost:8000/tasks/$TASK_ID/email \
            -H "Content-Type: application/json" \
            -d '{"to":"user@localhost"}'

          curl -fsS "http://localhost:8000/mail/imap/check?email=user%40localhost"
          curl -fsS "http://localhost:8000/mail/pop3/check?email=user%40localhost"

      - name: Cleanup containers and test images
        if: always()
        run: |
          docker rm -f todo_frontend todo_backend todo_db todo_mail || true
          docker network rm todo_net || true
          docker rmi todo_backend:ci todo_frontend:ci || true
          docker ps -a

      - name: Login to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/todo-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/todo-backend:${{ github.sha }}

      - name: Build and push frontend image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/todo-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/todo-frontend:${{ github.sha }}
